<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhishGuard — Análisis de Correos</title>
<style>
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text2: #8b949e;
    --accent: #1d9e75;
    --accent2: #0f6e56;
    --danger: #e24b4a;
    --danger-bg: #1c0e0e;
    --warn: #ef9f27;
    --warn-bg: #1a1200;
    --safe: #1d9e75;
    --safe-bg: #071a12;
    --radius: 10px;
    --radius-lg: 16px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    padding: 1.5rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg2);
  }

  .logo {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  header h1 {
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  header p {
    font-size: 0.75rem;
    color: var(--text2);
    margin-left: auto;
    font-family: system-ui, sans-serif;
  }

  .container {
    width: 100%;
    max-width: 820px;
    padding: 2rem 1.5rem;
    flex: 1;
  }

  /* === STEP INDICATOR === */
  .steps {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 2rem;
    font-family: system-ui, sans-serif;
  }

  .step {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.8rem;
    color: var(--text2);
    flex: 1;
  }

  .step.active .step-dot { background: var(--accent); color: #fff; border-color: var(--accent); }
  .step.active .step-label { color: var(--text); }
  .step.done .step-dot { background: var(--accent2); color: #fff; border-color: var(--accent2); }

  .step-dot {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    font-weight: 600;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .step-line {
    flex: 1;
    height: 1px;
    background: var(--border);
    margin: 0 8px;
  }

  /* === CARDS === */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 1rem;
    display: none;
  }

  .card.active { display: block; }

  .card-title {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text2);
    margin-bottom: 1rem;
    font-family: system-ui, sans-serif;
  }

  /* === FORM ELEMENTS === */
  .form-row { margin-bottom: 1rem; }

  label {
    display: block;
    font-size: 0.8rem;
    color: var(--text2);
    margin-bottom: 6px;
    font-family: system-ui, sans-serif;
  }

  input[type="text"],
  input[type="password"],
  input[type="email"],
  input[type="number"] {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: var(--accent); }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    font-family: system-ui, sans-serif;
    font-size: 0.875rem;
    font-weight: 500;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    width: 100%;
    justify-content: center;
    margin-top: 0.5rem;
  }

  .btn-primary:hover { background: var(--accent2); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-ghost {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
    font-size: 0.8rem;
    padding: 6px 12px;
  }

  .btn-ghost:hover { color: var(--text); border-color: var(--text2); }

  /* === EMAIL LIST === */
  .email-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1rem; }

  .email-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
    font-family: system-ui, sans-serif;
  }

  .email-item:hover { border-color: var(--accent); }
  .email-item.selected { border-color: var(--accent); background: rgba(29, 158, 117, 0.08); }

  .email-idx {
    width: 22px; height: 22px;
    background: var(--bg);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    color: var(--text2);
    flex-shrink: 0;
    font-family: monospace;
  }

  .email-from {
    font-size: 0.8rem;
    color: var(--text2);
    width: 200px;
    flex-shrink: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .email-subject {
    font-size: 0.85rem;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }

  .email-date {
    font-size: 0.7rem;
    color: var(--text2);
    flex-shrink: 0;
  }

  /* === RESULT === */
  .verdict {
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    border-width: 1.5px;
    border-style: solid;
    font-family: system-ui, sans-serif;
  }

  .verdict.danger { background: var(--danger-bg); border-color: var(--danger); }
  .verdict.warning { background: var(--warn-bg); border-color: var(--warn); }
  .verdict.safe { background: var(--safe-bg); border-color: var(--safe); }

  .verdict-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 0.4rem;
    opacity: 0.7;
  }

  .verdict.danger .verdict-label { color: var(--danger); }
  .verdict.warning .verdict-label { color: var(--warn); }
  .verdict.safe .verdict-label { color: var(--safe); }

  .verdict-title {
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 0.25rem;
    font-family: 'SF Mono', monospace;
    letter-spacing: -0.02em;
  }

  .verdict.danger .verdict-title { color: var(--danger); }
  .verdict.warning .verdict-title { color: var(--warn); }
  .verdict.safe .verdict-title { color: var(--safe); }

  .verdict-sub { font-size: 0.85rem; color: var(--text2); }

  .score-bar-wrap { margin-top: 1rem; }
  .score-bar-label { font-size: 0.7rem; color: var(--text2); margin-bottom: 4px; display: flex; justify-content: space-between; }
  .score-bar-track {
    height: 6px;
    background: var(--bg3);
    border-radius: 99px;
    overflow: hidden;
  }
  .score-bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.8s ease;
  }
  .verdict.danger .score-bar-fill { background: var(--danger); }
  .verdict.warning .score-bar-fill { background: var(--warn); }
  .verdict.safe .score-bar-fill { background: var(--safe); }

  .meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .meta-cell {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-family: system-ui, sans-serif;
  }

  .meta-key { font-size: 0.7rem; color: var(--text2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.08em; }
  .meta-val { font-size: 0.85rem; color: var(--text); font-family: monospace; word-break: break-all; }

  .auth-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.75rem;
    padding: 3px 10px;
    border-radius: 99px;
    font-family: system-ui, sans-serif;
  }

  .auth-badge.pass { background: rgba(29, 158, 117, 0.15); color: var(--safe); }
  .auth-badge.fail { background: rgba(226, 75, 74, 0.15); color: var(--danger); }

  .alerts-title {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text2);
    margin-bottom: 0.75rem;
    font-family: system-ui, sans-serif;
  }

  .alert-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-family: system-ui, sans-serif;
    font-size: 0.85rem;
    color: var(--text);
    line-height: 1.4;
  }

  .alert-item:last-child { border-bottom: none; }

  .alert-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--warn);
    flex-shrink: 0;
    margin-top: 6px;
  }

  /* === SPINNER === */
  .spinner {
    width: 22px; height: 22px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-msg {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 2rem;
    font-family: system-ui, sans-serif;
    color: var(--text2);
    font-size: 0.85rem;
  }

  /* === ALERT === */
  .alert-box {
    background: rgba(226, 75, 74, 0.1);
    border: 1px solid var(--danger);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 0.85rem;
    color: var(--danger);
    font-family: system-ui, sans-serif;
    margin-top: 0.75rem;
    display: none;
  }

  .hint {
    font-size: 0.75rem;
    color: var(--text2);
    margin-top: 4px;
    font-family: system-ui, sans-serif;
    line-height: 1.4;
  }

  .cantidad-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .cantidad-row .form-row { flex: 1; margin-bottom: 0; }

  .back-btn-wrap { margin-top: 1rem; text-align: center; }

</style>
</head>
<body>

<header>
  <div class="logo">🛡</div>
  <h1>PhishGuard</h1>
  <p>Sistema heurístico de análisis de phishing</p>
</header>

<div class="container">

  <!-- STEPS -->
  <div class="steps">
    <div class="step active" id="stp1">
      <div class="step-dot">1</div>
      <span class="step-label">Conexión</span>
    </div>
    <div class="step-line"></div>
    <div class="step" id="stp2">
      <div class="step-dot">2</div>
      <span class="step-label">Selección</span>
    </div>
    <div class="step-line"></div>
    <div class="step" id="stp3">
      <div class="step-dot">3</div>
      <span class="step-label">Análisis</span>
    </div>
  </div>

  <!-- PASO 1: Login -->
  <div class="card active" id="card-login">
    <div class="card-title">// Credenciales de acceso</div>

    <div class="form-row">
      <label>Correo electrónico</label>
      <input type="email" id="inp-usuario" placeholder="tu@gmail.com" autocomplete="email" oninput="actualizarHint()">
    </div>

    <div class="form-row">
      <label>Contraseña de aplicación</label>
      <input type="password" id="inp-password" placeholder="xxxx xxxx xxxx xxxx" autocomplete="current-password">
      <p class="hint" id="hint-password">Introduce tu correo para ver cómo obtener la contraseña de aplicación.</p>
    </div>

    <div class="cantidad-row">
      <div class="form-row" style="flex:1">
        <label>Correos a cargar</label>
        <input type="number" id="inp-cantidad" value="10" min="1" max="500">
      </div>
    </div>

    <div class="alert-box" id="err-login"></div>

    <button class="btn btn-primary" id="btn-conectar" onclick="conectar()">
      <span id="btn-conectar-txt">Conectar y cargar correos →</span>
    </button>
  </div>

  <!-- PASO 2: Lista de correos -->
  <div class="card" id="card-list">
    <div class="card-title" id="list-titulo">// Selecciona un correo para analizar</div>
    <div class="email-list" id="email-list"></div>
    <div class="alert-box" id="err-list"></div>
    <button class="btn btn-primary" id="btn-analizar" onclick="analizar()" disabled>
      <span id="btn-analizar-txt">Analizar correo seleccionado →</span>
    </button>
    <div class="back-btn-wrap">
      <button class="btn btn-ghost" onclick="volverLogin()">← Cambiar cuenta</button>
    </div>
  </div>

  <!-- PASO 3: Resultado -->
  <div class="card" id="card-result">
    <div id="result-content"></div>
    <div class="back-btn-wrap" style="display:flex; gap:10px; justify-content:center;">
      <button class="btn btn-ghost" onclick="volverLista()">← Analizar otro</button>
      <button class="btn btn-ghost" onclick="volverLogin()">⟳ Nueva sesión</button>
    </div>
  </div>

</div>

<script>
const API = 'http://localhost:5000/api';
let credenciales = { usuario: '', password: '' };
let emailSeleccionado = null;
let correosData = [];

function setStep(n) {
  [1,2,3].forEach(i => {
    const s = document.getElementById('stp'+i);
    s.classList.remove('active','done');
    if (i < n) s.classList.add('done');
    else if (i === n) s.classList.add('active');
  });
  ['login','list','result'].forEach((id,i) => {
    document.getElementById('card-'+id).classList.toggle('active', i+1 === n);
  });
}

async function conectar() {
  const usuario = document.getElementById('inp-usuario').value.trim();
  const password = document.getElementById('inp-password').value.trim();
  const cantidad = parseInt(document.getElementById('inp-cantidad').value) || 10;
  const errEl = document.getElementById('err-login');

  errEl.style.display = 'none';
  if (!usuario || !password) {
    errEl.textContent = 'Por favor, rellena el correo y la contraseña.';
    errEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('btn-conectar');
  const txt = document.getElementById('btn-conectar-txt');
  btn.disabled = true;
  txt.innerHTML = '<span class="spinner"></span> Conectando…';

  try {
    const res = await fetch(`${API}/conectar`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ usuario, password, cantidad })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error desconocido');

    credenciales = { usuario, password };
    correosData = data.correos;

    const listEl = document.getElementById('email-list');
    listEl.innerHTML = '';
    data.correos.forEach(c => {
      const item = document.createElement('div');
      item.className = 'email-item';
      item.dataset.id = c.id;
      item.dataset.idx = c.index;
      item.innerHTML = `
        <div class="email-idx">${c.index}</div>
        <div class="email-from">${esc(c.remitente)}</div>
        <div class="email-subject">${esc(c.asunto)}</div>
        <div class="email-date">${esc(c.fecha)}</div>
      `;
      item.onclick = () => seleccionarEmail(item, c.id);
      listEl.appendChild(item);
    });

    document.getElementById('list-titulo').textContent =
      `// ${data.total} correos en bandeja — mostrando ${data.correos.length} recientes`;

    setStep(2);
  } catch(e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    txt.textContent = 'Conectar y cargar correos →';
  }
}

function seleccionarEmail(el, id) {
  document.querySelectorAll('.email-item').forEach(i => i.classList.remove('selected'));
  el.classList.add('selected');
  emailSeleccionado = id;
  document.getElementById('btn-analizar').disabled = false;
}

async function analizar() {
  if (!emailSeleccionado) return;

  const btn = document.getElementById('btn-analizar');
  const txt = document.getElementById('btn-analizar-txt');
  btn.disabled = true;
  txt.innerHTML = '<span class="spinner"></span> Analizando…';

  setStep(3);
  document.getElementById('result-content').innerHTML = `
    <div class="loading-msg">
      <div class="spinner" style="width:32px;height:32px;border-width:3px"></div>
      <span>Analizando cabeceras, enlaces y heurística…</span>
    </div>
  `;
  document.getElementById('card-result').classList.add('active');

  try {
    const res = await fetch(`${API}/analizar`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...credenciales, email_id: emailSeleccionado })
    });
    const d = await res.json();
    if (!res.ok) throw new Error(d.error || 'Error en el análisis');

    const pct = Math.min(100, Math.max(0, d.puntos));
    const spfOk = (d.spf || '').toLowerCase() === 'pass';
    const dkimOk = (d.dkim || '').toLowerCase() === 'pass';

    const alertasHTML = d.alertas.length
      ? d.alertas.map(a => `<div class="alert-item"><div class="alert-dot"></div><span>${esc(a)}</span></div>`).join('')
      : '<div class="alert-item"><div class="alert-dot" style="background:var(--safe)"></div><span>No se han detectado señales de riesgo.</span></div>';

    document.getElementById('result-content').innerHTML = `
      <div class="verdict ${d.nivel}">
        <div class="verdict-label">Veredicto</div>
        <div class="verdict-title">${esc(d.veredicto)}</div>
        <div class="verdict-sub">${esc(d.asunto)}</div>
        ${d.ia_usada ? `<div style="margin-top:0.6rem;font-size:0.75rem;opacity:0.75;font-family:system-ui,sans-serif">🤖 Zona gris — veredicto definitivo por modelo IA (DistilBERT)</div>` : ""}
        ${!d.modelo_disponible && d.puntos >= 40 && d.puntos < 80 ? `<div style="margin-top:0.6rem;font-size:0.75rem;opacity:0.75;font-family:system-ui,sans-serif">⚠️ Zona gris — modelo IA no disponible en el servidor</div>` : ""}
        <div class="score-bar-wrap">
          <div class="score-bar-label"><span>Puntuación de riesgo</span><span>${d.puntos} pts</span></div>
          <div class="score-bar-track">
            <div class="score-bar-fill" style="width:${pct}%"></div>
          </div>
        </div>
      </div>

      <div class="meta-grid">
        <div class="meta-cell">
          <div class="meta-key">Remitente</div>
          <div class="meta-val">${esc(d.remitente)}</div>
        </div>
        <div class="meta-cell">
          <div class="meta-key">Origen geográfico</div>
          <div class="meta-val">${esc(d.pais)} <span style="color:var(--text2);font-size:0.75rem">(${esc(d.ip)})</span></div>
        </div>
        <div class="meta-cell">
          <div class="meta-key">SPF</div>
          <div class="meta-val">
            <span class="auth-badge ${spfOk ? 'pass' : 'fail'}">${spfOk ? '✓' : '✗'} ${esc(d.spf)}</span>
          </div>
        </div>
        <div class="meta-cell">
          <div class="meta-key">DKIM</div>
          <div class="meta-val">
            <span class="auth-badge ${dkimOk ? 'pass' : 'fail'}">${dkimOk ? '✓' : '✗'} ${esc(d.dkim)}</span>
          </div>
        </div>
        ${d.empresas_detectadas && d.empresas_detectadas.length ? `
        <div class="meta-cell" style="grid-column:span 2">
          <div class="meta-key">Empresas mencionadas</div>
          <div class="meta-val">${d.empresas_detectadas.map(e => esc(e)).join(', ')}</div>
        </div>` : ''}
      </div>

      <div class="alerts-title">// Señales detectadas (${d.alertas.length})</div>
      <div>${alertasHTML}</div>
      <div style="margin-top:1.5rem"></div>
    `;
  } catch(e) {
    document.getElementById('result-content').innerHTML = `
      <div class="alert-box" style="display:block">Error: ${esc(e.message)}</div>
    `;
  } finally {
    btn.disabled = false;
    txt.textContent = 'Analizar correo seleccionado →';
  }
}

function volverLogin() {
  emailSeleccionado = null;
  document.getElementById('err-login').style.display = 'none';
  setStep(1);
}

function volverLista() {
  emailSeleccionado = null;
  document.querySelectorAll('.email-item').forEach(i => i.classList.remove('selected'));
  document.getElementById('btn-analizar').disabled = true;
  setStep(2);
}
  
const HINTS_PROVEEDOR = {
  "gmail.com":   "Gmail: Cuenta Google → Seguridad → Verificación en 2 pasos → Contraseñas de aplicaciones",
  "outlook.com": "Implementacion de servidores de Outlook todavía en desarrollo",
  "hotmail.com": "Hotmail pertenece a Outlook, y su implementacion está todavía en desarrollo",
  "hotmail.es":  "Hotmail pertenece a Outlook, y su implementacion está todavía en desarrollo",
  "live.com":    "Live pertenece a Outlook, y su implementacion está todavía en desarrollo",
  "msn.com":     "MSN pertenece a Outlook, y su implementacion está todavía en desarrollo",
  "yahoo.com":   "Yahoo: Página de seguridad de Yahoo → Generar contraseña de aplicación",
  "yahoo.es":    "Yahoo: Página de seguridad de Yahoo → Generar contraseña de aplicación",
  "ymail.com":   "Ymail: Página de seguridad de Yahoo → Generar contraseña de aplicación",
};

function actualizarHint() {
  const val = document.getElementById('inp-usuario').value.trim().toLowerCase();
  const dominio = val.includes('@') ? val.split('@')[1] : '';
  const hintEl = document.getElementById('hint-password');
  if (HINTS_PROVEEDOR[dominio]) {
    hintEl.textContent = '💡 ' + HINTS_PROVEEDOR[dominio];
    hintEl.style.color = 'var(--accent)';
  } else if (dominio) {
    hintEl.textContent = '⚠️ Proveedor no soportado. Válidos: Gmail y Yahoo.';
    hintEl.style.color = 'var(--warn)';
  } else {
    hintEl.textContent = 'Introduce tu correo para ver cómo obtener la contraseña de aplicación.';
    hintEl.style.color = '';
  }
}
  
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
